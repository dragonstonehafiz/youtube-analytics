version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/secrets:/app/secrets
      - ./backend/outputs:/app/outputs
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    command: python server.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
